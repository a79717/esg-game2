<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聯小利 ESG 綠動力</title>
    <style>
        /* 基礎樣式重置 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            padding: 0; 
            font-family: "Microsoft JhengHei", sans-serif; 
            background: #fff; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 主容器：填滿手機螢幕 */
        .app-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        
        /* 頂部狀態列 */
        .header { 
            background: #fff; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-bottom: 1px solid #f0f0f0;
            z-index: 10;
        }
        .user-avatar { width: 45px; height: 45px; background: #e0e0e0; border-radius: 50%; }
        .points-display { margin-left: auto; text-align: right; }
        .points-val { color: #f39c12; font-weight: bold; font-size: 1.1rem; }

        /* 角色舞台區：佔據螢幕上半部 */
        .stage { 
            flex: 1; 
            background: linear-gradient(180deg, #94b9ff 0%, #ffffff 100%); 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            padding-bottom: 10px;
        }
        .avatar-img { 
            height: 85%; 
            max-height: 480px; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            transition: opacity 0.2s ease-in-out;
        }
        
        /* 性別切換按鈕 */
        .gender-switch { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            display: flex; 
            gap: 5px; 
            z-index: 5;
        }
        .btn-gender { 
            padding: 5px 12px; 
            font-size: 0.8rem; 
            border: 1px solid #4a90e2; 
            border-radius: 20px; 
            cursor: pointer; 
            background: rgba(255,255,255,0.8);
            color: #4a90e2;
        }
        .btn-gender.active { background: #4a90e2; color: white; }

        /* 下方內容資訊區 */
        .content-area { 
            height: 38vh; 
            background: #fff; 
            border-top-left-radius: 25px; 
            border-top-right-radius: 25px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.08); 
            padding: 20px 15px; 
            overflow-y: auto;
            z-index: 15;
        }
        .card { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 15px; 
            background: #f9f9f9; 
            margin-bottom: 10px; 
            border-radius: 15px; 
        }
        .btn-action { 
            background: #4a90e2; 
            color: white; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 10px; 
            font-size: 0.9rem;
            font-weight: bold;
        }
        .btn-off { background: #e74c3c; }

        /* 底部導覽列 */
        .nav-bar { 
            display: flex; 
            background: #fff; 
            border-top: 1px solid #eee; 
            padding: 10px 0 25px 0; /* 留給手機底部安全區 */
        }
        .nav-item { 
            flex: 1; 
            border: none; 
            background: none; 
            color: #95a5a6; 
            font-size: 0.75rem; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nav-item.active { color: #4a90e2; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="user-avatar"></div>
        <div>
            <div style="font-weight:bold; font-size:1rem;">聯小利</div>
            <div style="font-size:0.7rem; color:#7f8c8d;">Lv.99 神之減塑美食家</div>
        </div>
        <div class="points-display">
            <div class="points-val" id="totalPoints">20,260,407</div>
            <div style="font-size:0.6rem; color:#bdc3c7;">ID:00114514(員編)</div>
        </div>
    </div>

    <div class="stage">
        <div class="gender-switch">
            <button id="btnMale" class="btn-gender active" onclick="setGender('A')">男</button>
            <button id="btnFemale" class="btn-gender" onclick="setGender('B')">女</button>
        </div>
        <img id="mainAvatar" src="A1.png" class="avatar-img">
    </div>

    <div id="viewArea" class="content-area">
        </div>

    <div class="nav-bar">
        <button id="tabTask" class="nav-item active" onclick="showTab('task')">
            <span>🌿</span><span>每日ESG</span>
        </button>
        <button id="tabShop" class="nav-item" onclick="showTab('shop')">
            <span>🛒</span><span>ESG小舖</span>
        </button>
        <button class="nav-item" onclick="alert('排行榜預計加入：孫漢傑、謝欣臻等成員！')">
            <span>🏆</span><span>排行榜</span>
        </button>
    </div>
</div>

<script>
    let points = 20260407;
    let currentGender = 'A'; 
    let inventory = { hat: false, jacket: false };
    let equipped = { hat: false, jacket: false };

    // 紙娃娃圖片組合邏輯
    function updateAvatar() {
        let suffix = "1";
        if (equipped.hat && equipped.jacket) suffix = "1-4";
        else if (equipped.jacket) suffix = "1-3";
        else if (equipped.hat) suffix = "1-2";
        
        const avatarElement = document.getElementById('mainAvatar');
        avatarElement.style.opacity = 0; // 切換動畫
        setTimeout(() => {
            avatarElement.src = `${currentGender}${suffix}.png`;
            avatarElement.style.opacity = 1;
        }, 150);
    }

    function setGender(g) {
        currentGender = g;
        document.getElementById('btnMale').classList.toggle('active', g === 'A');
        document.getElementById('btnFemale').classList.toggle('active', g === 'B');
        updateAvatar();
    }

    function toggleEquip(part) {
        equipped[part] = !equipped[part];
        updateAvatar();
        showTab('shop');
    }

    function buyItem(part, name, price) {
        if (points >= price) {
            points -= price;
            inventory[part] = true;
            equipped[part] = true;
            document.getElementById('totalPoints').innerText = points.toLocaleString();
            updateAvatar();
            showTab('shop');
        } else {
            alert("積分不足，快去執行 ESG 任務！");
        }
    }

    function addPoints(amt) {
        points += amt;
        document.getElementById('totalPoints').innerText = points.toLocaleString();
    }

    function showTab(tab) {
        const view = document.getElementById('viewArea');
        document.getElementById('tabTask').classList.toggle('active', tab === 'task');
        document.getElementById('tabShop').classList.toggle('active', tab === 'shop');

        if (tab === 'task') {
            view.innerHTML = `
                <h4 style="margin:0 0 15px 0; font-size:1rem;">每日 ESG 任務 [cite: 67]</h4>
                <div class="card">
                    <div><div style="font-weight:bold;">使用環保餐具</div><div style="font-size:0.7rem; color:green;">+500 積分</div></div>
                    <button class="btn-action" onclick="addPoints(500)">完成</button>
                </div>
                <div class="card">
                    <div><div style="font-weight:bold;">走樓梯上下樓</div><div style="font-size:0.7rem; color:green;">+100 積分</div></div>
                    <button class="btn-action" onclick="addPoints(100)">完成</button>
                </div>
                <div class="card">
                    <div><div style="font-weight:bold;">運動 30 分鐘</div><div style="font-size:0.7rem; color:green;">+200 積分</div></div>
                    <button class="btn-action" onclick="addPoints(200)">完成</button>
                </div>
            `;
        } else {
            view.innerHTML = `
                <h4 style="margin:0 0 15px 0; font-size:1rem;">ESG 小舖 [cite: 111]</h4>
                <div class="card">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <img src="C1.png" style="width:45px;">
                        <div><div style="font-weight:bold;">TVBS 鴨舌帽</div><div style="font-size:0.8rem; color:#f39c12;">15,000 pts</div></div>
                    </div>
                    ${!inventory.hat ? 
                        `<button class="btn-action" onclick="buyItem('hat','鴨舌帽',15000)">兌換</button>` :
                        `<button class="btn-action ${equipped.hat ? 'btn-off' : ''}" onclick="toggleEquip('hat')">${equipped.hat ? '脫下' : '穿上'}</button>`
                    }
                </div>
                <div class="card">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <img src="C2.png" style="width:45px;">
                        <div><div style="font-weight:bold;">TVBS 棒球外套</div><div style="font-size:0.8rem; color:#f39c12;">30,000 pts</div></div>
                    </div>
                    ${!inventory.jacket ? 
                        `<button class="btn-action" onclick="buyItem('jacket','棒球外套',30000)">兌換</button>` :
                        `<button class="btn-action ${equipped.jacket ? 'btn-off' : ''}" onclick="toggleEquip('jacket')">${equipped.jacket ? '脫下' : '穿上'}</button>`
                    }
                </div>
            `;
        }
    }

    // 初始顯示
    showTab('task');
</script>

</body>
</html>
